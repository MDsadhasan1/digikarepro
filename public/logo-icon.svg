<!-- Icon-only version: use as favicon / app icon -->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 44 44"
  fill="none"
  aria-label="dogikarepro icon"
  role="img"
>
  <defs>
    <linearGradient id="iconBG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="iconFG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#EFF4FF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#CCFBF1" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <rect width="44" height="44" rx="11" fill="url(#iconBG)"/>

  <!-- D bar -->
  <rect x="10" y="9" width="4.5" height="26" rx="2.2" fill="url(#iconFG)"/>

  <!-- D curve -->
  <path
    d="M14.5 9 Q32 9 32 22 Q32 35 14.5 35"
    stroke="url(#iconFG)"
    stroke-width="4.5"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Circuit nodes -->
  <circle cx="30" cy="14.5" r="2.5" fill="#F97316"/>
  <circle cx="32" cy="22"   r="2.8" fill="#FFFFFF" fill-opacity="0.9"/>
  <circle cx="30" cy="29.5" r="2.5" fill="#F97316"/>

  <!-- Heartbeat line -->
  <path
    d="M10 22 L14.5 22 L16.5 17.5 L19 26.5 L21.5 19.5 L24 24 L26 22 L32 22"
    stroke="#FFFFFF"
    stroke-width="1.6"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.55"
  />
</svg>
