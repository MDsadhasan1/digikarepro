<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 220 44"
  fill="none"
  aria-label="dogikarepro"
  role="img"
>
  <title>dogikarepro</title>
  <defs>
    <!-- Brand gradient: Royal Blue → Teal -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <!-- Icon inner glow -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#EFF4FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#CCFBF1" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#2563EB" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- ── Icon mark: Stylized "D" with digital circuit + care dot ── -->
  <g filter="url(#dropShadow)">
    <!-- Outer rounded rectangle background -->
    <rect x="0" y="2" width="40" height="40" rx="10" fill="url(#brandGrad)"/>

    <!-- Stylized "D" shape: main vertical bar -->
    <rect x="10" y="9" width="4" height="26" rx="2" fill="url(#iconGrad)"/>

    <!-- "D" curved right: top arc, mid arc, bottom line (path) -->
    <path
      d="M14 9 Q30 9 30 22 Q30 35 14 35"
      stroke="url(#iconGrad)"
      stroke-width="4"
      stroke-linecap="round"
      fill="none"
    />

    <!-- Digital circuit nodes — small circles on the D curve -->
    <circle cx="28" cy="14" r="2.2" fill="#F97316"/>
    <circle cx="30" cy="22" r="2.5" fill="#FFFFFF" fill-opacity="0.9"/>
    <circle cx="28" cy="30" r="2.2" fill="#F97316"/>

    <!-- Horizontal circuit lines from nodes -->
    <line x1="28" y1="14" x2="34" y2="14" stroke="#F97316" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="30" y1="22" x2="37" y2="22" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="28" y1="30" x2="34" y2="30" stroke="#F97316" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

    <!-- Heartbeat / care line — subtle pulse through the "D" -->
    <path
      d="M10 22 L14 22 L16 18 L18 26 L20 20 L22 24 L24 22 L30 22"
      stroke="#FFFFFF"
      stroke-width="1.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
      opacity="0.55"
    />
  </g>

  <!-- ── Wordmark: "dogikare" bold + "pro" teal ── -->
  <text
    x="50"
    y="30"
    font-family="'Inter', 'Satoshi', system-ui, sans-serif"
    font-weight="700"
    font-size="20"
    letter-spacing="-0.5"
    fill="#1E3A8A"
  >dogikare</text>

  <text
    x="152"
    y="30"
    font-family="'Inter', 'Satoshi', system-ui, sans-serif"
    font-weight="700"
    font-size="20"
    letter-spacing="-0.5"
    fill="#14B8A6"
  >pro</text>

  <!-- Subtle tagline (optional – remove if too busy) -->
  <text
    x="50"
    y="40"
    font-family="'Inter', system-ui, sans-serif"
    font-weight="400"
    font-size="7"
    letter-spacing="1.5"
    fill="#64748B"
    text-anchor="start"
  >SMART CARE · SMART SHOPPING</text>
</svg>
